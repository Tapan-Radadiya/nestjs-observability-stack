services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9000:9000"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
  
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    ports:
      - "5000:5000"
    volumes:
      - grafana-loki:/var/lib/grafana
  
volumes:
  prometheus_data:
  grafana-loki: